name: 'Auto-approve stale PRs'
description: 'Auto-approves owner/member PRs after configurable days without review, with countdown labels and comments'
author: 'mPokornyETM'

branding:
  icon: 'clock'
  color: 'orange'

inputs:
  days-until-approve:
    description: 'Days to wait before auto-approving (minimum 1)'
    required: false
    default: '3'
  author-associations:
    description: 'Comma-separated list of author associations to process (OWNER,MEMBER,COLLABORATOR)'
    required: false
    default: 'OWNER,MEMBER'
  merge-method:
    description: 'Merge method: squash, merge, or rebase'
    required: false
    default: 'squash'
  dry-run:
    description: 'If true, only log actions without making changes'
    required: false
    default: 'false'
  skip-drafts:
    description: 'If true, skip draft PRs (default: true)'
    required: false
    default: 'true'
  require-green-ci:
    description: 'If true, pause countdown when CI checks are failing (default: true)'
    required: false
    default: 'true'
  token:
    description: 'GitHub token with pull-requests write permission'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Create countdown labels
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        DAYS: ${{ inputs.days-until-approve }}
      run: ${{ github.action_path }}/scripts/create-labels.sh

    - name: Process stale PRs
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        DAYS: ${{ inputs.days-until-approve }}
        ASSOCIATIONS: ${{ inputs.author-associations }}
        MERGE_METHOD: ${{ inputs.merge-method }}
        DRY_RUN: ${{ inputs.dry-run }}
        SKIP_DRAFTS: ${{ inputs.skip-drafts }}
        REQUIRE_GREEN_CI: ${{ inputs.require-green-ci }}
      run: ${{ github.action_path }}/scripts/countdown.sh
